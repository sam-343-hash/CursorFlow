<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>

<header>
  <h1>AI Cursor Assistant</h1>
  <button id="optionsBtn" class="icon-btn" title="Settings">⚙</button>
</header>

<div id="providerStatus" class="provider-status">Checking AI setup...</div>

<div class="input-row">
  <input type="text" id="goalInput" placeholder="e.g. change my profile picture">
  <button id="voiceBtn" class="icon-btn" title="Speak your goal">🎤</button>
</div>

<div class="button-row">
  <button id="runBtn" class="primary">Run</button>
  <button id="stopBtn" class="secondary" style="display:none;">Stop</button>
</div>

<div class="button-row">
  <button id="allowBtn" class="secondary">Enable on this site</button>
  <button id="disableBtn" class="secondary">Disable</button>
</div>

<div id="status">Ready.</div>
<div id="progressLog"></div>

<script src="popup.js"></script>
</body>
</html>
